name: CI Build

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Generate Swagger docs
        run: go generate ./cmd/server

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: internal/server/app/dist
          retention-days: 1

  android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install gomobile
        shell: bash
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go install golang.org/x/mobile/cmd/gomobile@latest
          "$(go env GOPATH)/bin/gomobile" init

      - name: Build Android AAR
        shell: bash
        run: |
          mkdir -p android/app/libs
          gomobile bind -target=android/arm64 -androidapi 21 -javapkg com.gotunnel.mobilebind -o android/app/libs/gotunnelmobile.aar github.com/gotunnel/mobile/gotunnelmobile

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Resolve build version
        id: version
        shell: bash
        run: |
          echo "value=$(bash ./scripts/resolve_version.sh)" >> "$GITHUB_OUTPUT"

      - name: Prepare Android signing
        id: sign
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GOTUNNEL_ANDROID_KEYSTORE_B64: ${{ secrets.GOTUNNEL_ANDROID_KEYSTORE_B64 }}
          GOTUNNEL_ANDROID_STORE_PASSWORD: ${{ secrets.GOTUNNEL_ANDROID_STORE_PASSWORD }}
          GOTUNNEL_ANDROID_KEY_ALIAS: ${{ secrets.GOTUNNEL_ANDROID_KEY_ALIAS }}
          GOTUNNEL_ANDROID_KEY_PASSWORD: ${{ secrets.GOTUNNEL_ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "${GOTUNNEL_ANDROID_KEYSTORE_B64}" ] && \
             [ -n "${GOTUNNEL_ANDROID_STORE_PASSWORD}" ] && \
             [ -n "${GOTUNNEL_ANDROID_KEY_ALIAS}" ] && \
             [ -n "${GOTUNNEL_ANDROID_KEY_PASSWORD}" ]; then
            mkdir -p .github/tmp
            echo "${GOTUNNEL_ANDROID_KEYSTORE_B64}" | base64 --decode > .github/tmp/android-release.keystore
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "store_file=${GITHUB_WORKSPACE}/.github/tmp/android-release.keystore" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Android APK
        id: apk
        working-directory: android
        shell: bash
        env:
          GOTUNNEL_ANDROID_STORE_PASSWORD: ${{ secrets.GOTUNNEL_ANDROID_STORE_PASSWORD }}
          GOTUNNEL_ANDROID_KEY_ALIAS: ${{ secrets.GOTUNNEL_ANDROID_KEY_ALIAS }}
          GOTUNNEL_ANDROID_KEY_PASSWORD: ${{ secrets.GOTUNNEL_ANDROID_KEY_PASSWORD }}
        run: |
          VERSION_NAME="${{ steps.version.outputs.value }}"
          if [ "${{ steps.sign.outputs.enabled }}" = "true" ]; then
            gradle --no-daemon assembleRelease \
              -PgotunnelVersionName="${VERSION_NAME}" \
              -PgotunnelReleaseStoreFile="${{ steps.sign.outputs.store_file }}" \
              -PgotunnelReleaseStorePassword="${GOTUNNEL_ANDROID_STORE_PASSWORD}" \
              -PgotunnelReleaseKeyAlias="${GOTUNNEL_ANDROID_KEY_ALIAS}" \
              -PgotunnelReleaseKeyPassword="${GOTUNNEL_ANDROID_KEY_PASSWORD}"
            echo "artifact_path=app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_OUTPUT"
            echo "artifact_name=gotunnel-android-signed-release-apk" >> "$GITHUB_OUTPUT"
          else
            gradle --no-daemon assembleDebug -PgotunnelVersionName="${VERSION_NAME}"
            echo "artifact_path=app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_OUTPUT"
            echo "artifact_name=gotunnel-android-debug-apk" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.artifact_name }}
          path: android/${{ steps.apk.outputs.artifact_path }}
          retention-days: 7

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: frontend
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
          - runner: windows-latest
            goos: windows
            goarch: amd64
          - runner: windows-latest
            goos: windows
            goarch: arm64
          - runner: macos-latest
            goos: darwin
            goarch: amd64
          - runner: macos-latest
            goos: darwin
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: internal/server/app/dist

      - name: Download Go modules
        run: go mod download

      - name: Resolve build metadata
        id: version
        shell: bash
        run: |
          echo "value=$(bash ./scripts/resolve_version.sh)" >> "$GITHUB_OUTPUT"
          echo "commit=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build server and client
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ steps.version.outputs.value }}
          GIT_COMMIT: ${{ steps.version.outputs.commit }}
          BUILD_TIME: ${{ steps.version.outputs.build_time }}
        run: |
          mkdir -p build/${GOOS}_${GOARCH}
          EXT=""
          if [ "$GOOS" = "windows" ]; then
            EXT=".exe"
          fi

          LDFLAGS="-s -w -X 'main.Version=${VERSION}' -X 'main.BuildTime=${BUILD_TIME}' -X 'main.GitCommit=${GIT_COMMIT}'"

          go build -trimpath -ldflags "$LDFLAGS" -o "build/${GOOS}_${GOARCH}/server${EXT}" ./cmd/server
          go build -trimpath -ldflags "$LDFLAGS" -o "build/${GOOS}_${GOARCH}/client${EXT}" ./cmd/client

      - name: Upload binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: gotunnel-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/${{ matrix.goos }}_${{ matrix.goarch }}/
          retention-days: 7
