name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, e.g. v1.2.3'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Generate Swagger docs
        run: go generate ./cmd/server

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: internal/server/app/dist
          retention-days: 1

  android-apk:
    name: Package Android release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install gomobile
        shell: bash
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go install golang.org/x/mobile/cmd/gomobile@latest
          "$(go env GOPATH)/bin/gomobile" init

      - name: Build Android AAR
        shell: bash
        run: |
          mkdir -p android/app/libs
          gomobile bind -target=android/arm64 -androidapi 21 -javapkg com.gotunnel.mobilebind -o android/app/libs/gotunnelmobile.aar github.com/gotunnel/mobile/gotunnelmobile

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Prepare Android signing
        id: sign
        shell: bash
        env:
          GOTUNNEL_ANDROID_KEYSTORE_B64: ${{ secrets.GOTUNNEL_ANDROID_KEYSTORE_B64 }}
          GOTUNNEL_ANDROID_STORE_PASSWORD: ${{ secrets.GOTUNNEL_ANDROID_STORE_PASSWORD }}
          GOTUNNEL_ANDROID_KEY_ALIAS: ${{ secrets.GOTUNNEL_ANDROID_KEY_ALIAS }}
          GOTUNNEL_ANDROID_KEY_PASSWORD: ${{ secrets.GOTUNNEL_ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "${GOTUNNEL_ANDROID_KEYSTORE_B64}" ] && \
             [ -n "${GOTUNNEL_ANDROID_STORE_PASSWORD}" ] && \
             [ -n "${GOTUNNEL_ANDROID_KEY_ALIAS}" ] && \
             [ -n "${GOTUNNEL_ANDROID_KEY_PASSWORD}" ]; then
            mkdir -p .github/tmp
            echo "${GOTUNNEL_ANDROID_KEYSTORE_B64}" | base64 --decode > .github/tmp/android-release.keystore
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "store_file=${GITHUB_WORKSPACE}/.github/tmp/android-release.keystore" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release APK
        working-directory: android
        shell: bash
        env:
          GOTUNNEL_ANDROID_STORE_PASSWORD: ${{ secrets.GOTUNNEL_ANDROID_STORE_PASSWORD }}
          GOTUNNEL_ANDROID_KEY_ALIAS: ${{ secrets.GOTUNNEL_ANDROID_KEY_ALIAS }}
          GOTUNNEL_ANDROID_KEY_PASSWORD: ${{ secrets.GOTUNNEL_ANDROID_KEY_PASSWORD }}
        run: |
          GRADLE_ARGS=(
            "--no-daemon"
            "assembleRelease"
            "-PgotunnelVersionName=${{ steps.meta.outputs.tag }}"
          )
          if [ "${{ steps.sign.outputs.enabled }}" = "true" ]; then
            GRADLE_ARGS+=(
              "-PgotunnelReleaseStoreFile=${{ steps.sign.outputs.store_file }}"
              "-PgotunnelReleaseStorePassword=${GOTUNNEL_ANDROID_STORE_PASSWORD}"
              "-PgotunnelReleaseKeyAlias=${GOTUNNEL_ANDROID_KEY_ALIAS}"
              "-PgotunnelReleaseKeyPassword=${GOTUNNEL_ANDROID_KEY_PASSWORD}"
            )
          fi
          gradle "${GRADLE_ARGS[@]}"

      - name: Verify signed Android release APK
        shell: bash
        run: |
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          if [ "${{ steps.sign.outputs.enabled }}" != "true" ]; then
            echo "Android release signing secrets are required to publish an installable release APK." >&2
            exit 1
          fi
          if [ ! -f "${APK_PATH}" ]; then
            echo "Signed release APK not found at ${APK_PATH}" >&2
            exit 1
          fi

      - name: Package Android release asset
        id: package
        shell: bash
        run: |
          mkdir -p dist/out
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          ARCHIVE="gotunnel-android-${{ steps.meta.outputs.tag }}-release.apk"
          cp "${APK_PATH}" "dist/out/${ARCHIVE}"
          echo "archive=dist/out/${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Upload Android release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-android-apk
          path: ${{ steps.package.outputs.archive }}
          retention-days: 1

  build-assets:
    name: Package ${{ matrix.component }} ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: server
            goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - component: client
            goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - component: server
            goos: linux
            goarch: arm64
            archive_ext: tar.gz
          - component: client
            goos: linux
            goarch: arm64
            archive_ext: tar.gz
          - component: server
            goos: darwin
            goarch: amd64
            archive_ext: tar.gz
          - component: client
            goos: darwin
            goarch: amd64
            archive_ext: tar.gz
          - component: server
            goos: darwin
            goarch: arm64
            archive_ext: tar.gz
          - component: client
            goos: darwin
            goarch: arm64
            archive_ext: tar.gz
          - component: server
            goos: windows
            goarch: amd64
            archive_ext: zip
          - component: client
            goos: windows
            goarch: amd64
            archive_ext: zip
          - component: server
            goos: windows
            goarch: arm64
            archive_ext: zip
          - component: client
            goos: windows
            goarch: arm64
            archive_ext: zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: internal/server/app/dist

      - name: Download Go modules
        run: go mod download

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "commit=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ steps.meta.outputs.tag }}
          GIT_COMMIT: ${{ steps.meta.outputs.commit }}
          BUILD_TIME: ${{ steps.meta.outputs.build_time }}
        run: |
          mkdir -p dist/package
          EXT=""
          if [ "$GOOS" = "windows" ]; then
            EXT=".exe"
          fi

          OUTPUT_NAME="gotunnel-${{ matrix.component }}${EXT}"
          LDFLAGS="-s -w -X 'main.Version=${VERSION}' -X 'main.BuildTime=${BUILD_TIME}' -X 'main.GitCommit=${GIT_COMMIT}'"
          go build -trimpath -ldflags "$LDFLAGS" -o "dist/package/${OUTPUT_NAME}" ./cmd/${{ matrix.component }}

      - name: Create release archive
        id: package
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          ARCHIVE="gotunnel-${{ matrix.component }}-${TAG}-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive_ext }}"
          mkdir -p dist/out
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            (cd dist/package && zip -r "../out/${ARCHIVE}" .)
          else
            tar -C dist/package -czf "dist/out/${ARCHIVE}" .
          fi
          echo "archive=dist/out/${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.component }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.package.outputs.archive }}
          retention-days: 1

  publish:
    name: Publish release
    needs:
      - build-assets
      - android-apk
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        shell: bash
        run: |
          cd release-artifacts
          sha256sum * > SHA256SUMS.txt

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-artifacts/*
