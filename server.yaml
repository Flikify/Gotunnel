# GoTunnel Server Configuration
server:
  bind_addr: "0.0.0.0"
  bind_port: 7000
  token: "your-secret-token"
  heartbeat_sec: 30
  heartbeat_timeout: 90

# Client configurations (centralized management)
clients:
  - id: "client-a"
    rules:
      - name: "web"
        local_ip: "127.0.0.1"
        local_port: 80
        remote_port: 8080
      - name: "ssh"
        local_ip: "127.0.0.1"
        local_port: 22
        remote_port: 2222

  - id: "client-b"
    rules:
      - name: "mysql"
        local_ip: "127.0.0.1"
        local_port: 3306
        remote_port: 13306
