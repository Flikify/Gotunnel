basePath: /
definitions:
  db.TrafficRecord:
    properties:
      inbound:
        description: 入站流量（字节）
        type: integer
      outbound:
        description: 出站流量（字节）
        type: integer
      timestamp:
        description: Unix 时间戳（小时级别）
        type: integer
    type: object
  dto.ApplyClientUpdateRequest:
    description: 推送更新到客户端
    properties:
      client_id:
        type: string
      download_url:
        type: string
    required:
    - client_id
    - download_url
    type: object
  dto.ApplyServerUpdateRequest:
    description: 应用服务端更新
    properties:
      download_url:
        type: string
      restart:
        type: boolean
    required:
    - download_url
    type: object
  dto.CheckUpdateResponse:
    description: 更新检查结果
    properties:
      asset_name:
        type: string
      asset_size:
        type: integer
      available:
        type: boolean
      current:
        type: string
      download_url:
        type: string
      latest:
        type: string
      release_note:
        type: string
    type: object
  dto.ClientListItem:
    description: 客户端列表中的单个项目
    properties:
      arch:
        example: amd64
        type: string
      id:
        example: client-001
        type: string
      last_offline_at:
        type: integer
      last_ping:
        type: string
      nickname:
        example: My Client
        type: string
      online:
        example: true
        type: boolean
      os:
        example: linux
        type: string
      remote_addr:
        type: string
      rule_count:
        example: 3
        type: integer
      version:
        example: 1.0.0
        type: string
    type: object
  dto.ClientResponse:
    description: 客户端详细信息
    properties:
      arch:
        example: amd64
        type: string
      id:
        example: client-001
        type: string
      last_offline_at:
        example: 1735785000
        type: integer
      last_ping:
        example: "2025-01-02T10:30:00Z"
        type: string
      nickname:
        example: My Client
        type: string
      online:
        example: true
        type: boolean
      os:
        example: linux
        type: string
      remote_addr:
        example: 192.168.1.100:54321
        type: string
      rules:
        items:
          $ref: '#/definitions/dto.ProxyRule'
        type: array
      version:
        example: 1.0.0
        type: string
    type: object
  dto.ConfigUpdateResponse:
    properties:
      applied_runtime_fields:
        items:
          type: string
        type: array
      restart_required_fields:
        items:
          type: string
        type: array
      status:
        type: string
    type: object
  dto.CreateClientRequest:
    description: 创建新客户端的请求体
    properties:
      id:
        example: client-001
        maxLength: 64
        minLength: 1
        type: string
      rules:
        items:
          $ref: '#/definitions/dto.ProxyRule'
        type: array
    required:
    - id
    type: object
  dto.ExecuteShellRequest:
    properties:
      command:
        type: string
      timeout:
        type: integer
    required:
    - command
    type: object
  dto.HourlyTrafficResponse:
    properties:
      records:
        items:
          $ref: '#/definitions/db.TrafficRecord'
        type: array
    type: object
  dto.LoginRequest:
    description: 用户登录
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  dto.LoginResponse:
    description: 登录成功返回
    properties:
      token:
        type: string
    type: object
  dto.ProxyRule:
    properties:
      auth_enabled:
        type: boolean
      auth_password:
        type: string
      auth_username:
        type: string
      enabled:
        type: boolean
      local_ip:
        type: string
      local_port:
        type: integer
      name:
        type: string
      port_status:
        type: string
      remote_port:
        type: integer
      type:
        type: string
    type: object
  dto.ScreenshotResponse:
    properties:
      data:
        type: string
      error:
        type: string
      height:
        type: integer
      timestamp:
        type: integer
      width:
        type: integer
    type: object
  dto.ServerConfigInfo:
    properties:
      bind_addr:
        type: string
      bind_port:
        type: integer
      client_response_timeout_sec:
        type: integer
      heartbeat_sec:
        type: integer
      heartbeat_timeout:
        type: integer
      max_client_proxies:
        type: integer
      token:
        type: string
    type: object
  dto.ServerConfigPart:
    properties:
      bind_addr:
        type: string
      bind_port:
        maximum: 65535
        minimum: 1
        type: integer
      client_response_timeout_sec:
        maximum: 300
        minimum: 1
        type: integer
      heartbeat_sec:
        maximum: 3600
        minimum: 1
        type: integer
      heartbeat_timeout:
        maximum: 3600
        minimum: 1
        type: integer
      max_client_proxies:
        maximum: 10000
        minimum: 0
        type: integer
      token:
        minLength: 8
        type: string
    type: object
  dto.ServerConfigResponse:
    properties:
      server:
        $ref: '#/definitions/dto.ServerConfigInfo'
      web:
        $ref: '#/definitions/dto.WebConfigInfo'
    type: object
  dto.ServerStatus:
    properties:
      bind_addr:
        type: string
      bind_port:
        type: integer
    type: object
  dto.ShellExecuteResponse:
    properties:
      error:
        type: string
      exit_code:
        type: integer
      output:
        type: string
    type: object
  dto.StatusResponse:
    description: 服务器状态信息
    properties:
      client_count:
        type: integer
      server:
        $ref: '#/definitions/dto.ServerStatus'
    type: object
  dto.SystemStatsResponse:
    properties:
      cpu_usage:
        type: number
      disk_total:
        type: integer
      disk_usage:
        type: number
      disk_used:
        type: integer
      memory_total:
        type: integer
      memory_usage:
        type: number
      memory_used:
        type: integer
    type: object
  dto.TokenCheckResponse:
    description: Token 验证结果
    properties:
      username:
        type: string
      valid:
        type: boolean
    type: object
  dto.TrafficStatsResponse:
    properties:
      traffic_24h:
        $ref: '#/definitions/dto.TrafficTotals'
      traffic_total:
        $ref: '#/definitions/dto.TrafficTotals'
    type: object
  dto.TrafficTotals:
    properties:
      inbound:
        type: integer
      outbound:
        type: integer
    type: object
  dto.UpdateClientRequest:
    description: 更新客户端配置的请求体
    properties:
      nickname:
        example: My Client
        maxLength: 128
        type: string
      rules:
        items:
          $ref: '#/definitions/dto.ProxyRule'
        type: array
    type: object
  dto.UpdateServerConfigRequest:
    properties:
      server:
        $ref: '#/definitions/dto.ServerConfigPart'
      web:
        $ref: '#/definitions/dto.WebConfigPart'
    type: object
  dto.VersionInfo:
    description: 当前版本信息
    properties:
      arch:
        type: string
      build_time:
        type: string
      git_commit:
        type: string
      go_version:
        type: string
      os:
        type: string
      version:
        type: string
    type: object
  dto.WebConfigInfo:
    properties:
      bind_port:
        type: integer
      enabled:
        type: boolean
      password:
        type: string
      username:
        type: string
    type: object
  dto.WebConfigPart:
    properties:
      bind_port:
        maximum: 65535
        minimum: 1
        type: integer
      enabled:
        type: boolean
      password:
        maxLength: 64
        minLength: 6
        type: string
      username:
        maxLength: 32
        minLength: 3
        type: string
    type: object
  handler.InstallCommandResponse:
    properties:
      expires_at:
        type: integer
      token:
        type: string
      tunnel_port:
        type: integer
    type: object
  handler.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
host: localhost:7500
info:
  contact: {}
  description: GoTunnel 内网穿透服务器 API
  title: GoTunnel API
  version: "1.0"
paths:
  /api/auth/check:
    get:
      description: 验证 JWT token 是否有效
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handler.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.TokenCheckResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.Response'
      security:
      - Bearer: []
      summary: 检查 Token
      tags:
      - 认证
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: 使用用户名密码登录，返回 JWT token
      parameters:
      - description: 登录信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handler.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.LoginResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 用户登录
      tags:
      - 认证
  /api/client/{id}:
    delete:
      description: 删除指定的客户端配置
      parameters:
      - description: 客户端ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.Response'
      security:
      - Bearer: []
      summary: 删除客户端
      tags:
      - 客户端
    get:
      description: 获取指定客户端的详细信息
      parameters:
      - description: 客户端ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handler.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.ClientResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.Response'
      security:
      - Bearer: []
      summary: 获取客户端详情
      tags:
      - 客户端
    put:
      consumes:
      - application/json
      description: 更新指定客户端的配置信息
      parameters:
      - description: 客户端ID
        in: path
        name: id
        required: true
        type: string
      - description: 更新内容
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateClientRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.Response'
      security:
      - Bearer: []
      summary: 更新客户端配置
      tags:
      - 客户端
  /api/client/{id}/disconnect:
    post:
      description: 强制断开客户端连接
      parameters:
      - description: 客户端ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.Response'
      security:
      - Bearer: []
      summary: 断开连接
      tags:
      - 客户端
  /api/client/{id}/logs:
    get:
      description: 通过 Server-Sent Events 实时接收客户端日志
      parameters:
      - description: 客户端 ID
        in: path
        name: id
        required: true
        type: string
      - default: 100
        description: 初始日志行数
        in: query
        name: lines
        type: integer
      - default: true
        description: 是否持续推送新日志
        in: query
        name: follow
        type: boolean
      - description: 日志级别过滤 (info, warn, error)
        in: query
        name: level
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: Server-Sent Events stream
          schema:
            type: string
      security:
      - Bearer: []
      summary: 流式传输客户端日志
      tags:
      - Logs
  /api/client/{id}/push:
    post:
      description: 将配置推送到在线客户端
      parameters:
      - description: 客户端ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.Response'
      security:
      - Bearer: []
      summary: 推送配置
      tags:
      - 客户端
  /api/client/{id}/restart:
    post:
      description: 发送重启命令到客户端
      parameters:
      - description: 客户端ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.Response'
      security:
      - Bearer: []
      summary: 重启客户端
      tags:
      - 客户端
  /api/client/{id}/screenshot:
    get:
      description: 获取在线客户端当前屏幕截图
      parameters:
      - description: 客户端ID
        in: path
        name: id
        required: true
        type: string
      - description: JPEG 质量，1-100，0 使用默认值
        in: query
        name: quality
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handler.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.ScreenshotResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.Response'
      security:
      - Bearer: []
      summary: 获取客户端截图
      tags:
      - 客户端
  /api/client/{id}/shell:
    post:
      consumes:
      - application/json
      description: 在在线客户端执行单条 Shell 命令并返回输出
      parameters:
      - description: 客户端ID
        in: path
        name: id
        required: true
        type: string
      - description: Shell 执行参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ExecuteShellRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handler.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.ShellExecuteResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.Response'
      security:
      - Bearer: []
      summary: 执行客户端 Shell 命令
      tags:
      - 客户端
  /api/client/{id}/system-stats:
    get:
      description: 获取在线客户端的系统资源使用情况
      parameters:
      - description: 客户端ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handler.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.SystemStatsResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.Response'
      security:
      - Bearer: []
      summary: 获取客户端系统状态
      tags:
      - 客户端
  /api/clients:
    get:
      description: 返回所有注册客户端的列表及其在线状态
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handler.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.ClientListItem'
                  type: array
              type: object
      security:
      - Bearer: []
      summary: 获取所有客户端
      tags:
      - 客户端
    post:
      consumes:
      - application/json
      description: 创建一个新的客户端配置
      parameters:
      - description: 客户端信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateClientRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handler.Response'
      security:
      - Bearer: []
      summary: 创建新客户端
      tags:
      - 客户端
  /api/config:
    get:
      description: 返回服务器配置（敏感信息脱敏）
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handler.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.ServerConfigResponse'
              type: object
      security:
      - Bearer: []
      summary: 获取配置
      tags:
      - 配置
    put:
      consumes:
      - application/json
      description: 更新服务器配置
      parameters:
      - description: 配置内容
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateServerConfigRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handler.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.ConfigUpdateResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.Response'
      security:
      - Bearer: []
      summary: 更新配置
      tags:
      - 配置
  /api/install/generate:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.InstallCommandResponse'
      summary: Generate install command payload
      tags:
      - install
  /api/status:
    get:
      description: 返回服务器运行状态和客户端数量
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handler.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.StatusResponse'
              type: object
      security:
      - Bearer: []
      summary: 获取服务器状态
      tags:
      - 状态
  /api/traffic/hourly:
    get:
      description: 获取最近N小时的流量记录
      parameters:
      - default: 24
        description: 小时数
        in: query
        name: hours
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handler.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.HourlyTrafficResponse'
              type: object
      security:
      - Bearer: []
      summary: 获取每小时流量
      tags:
      - 流量
  /api/traffic/stats:
    get:
      description: 获取24小时和总流量统计
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handler.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.TrafficStatsResponse'
              type: object
      security:
      - Bearer: []
      summary: 获取流量统计
      tags:
      - 流量
  /api/update/apply/client:
    post:
      consumes:
      - application/json
      description: 向指定客户端推送更新命令
      parameters:
      - description: 更新请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ApplyClientUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.Response'
      security:
      - Bearer: []
      summary: 推送客户端更新
      tags:
      - 更新
  /api/update/apply/server:
    post:
      consumes:
      - application/json
      description: 下载并应用服务端更新，服务器将自动重启
      parameters:
      - description: 更新请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ApplyServerUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.Response'
      security:
      - Bearer: []
      summary: 应用服务端更新
      tags:
      - 更新
  /api/update/check/client:
    get:
      description: 检查是否有新的客户端版本可用
      parameters:
      - description: 操作系统
        enum:
        - linux
        - darwin
        - windows
        in: query
        name: os
        type: string
      - description: 架构
        enum:
        - amd64
        - arm64
        - "386"
        - arm
        in: query
        name: arch
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/handler.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.CheckUpdateResponse'
              type: object
